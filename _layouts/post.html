<!DOCTYPE html>
<html lang="en">
<head>
  <meta property="article:author" content="Linton McCracken">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | Linton McCracken</title>
  <link rel="stylesheet" href="/assets_style.css">

  <!-- SEO and Social Meta -->
  <meta name="description" content="{{ page.excerpt | strip_html | truncate: 160 }}">

  <meta property="og:title" content="{{ page.title }} | Linton McCracken">
  <meta property="og:description" content="{{ page.excerpt | strip_html | truncate: 160 }}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="https://lintonmccracken.com{{ page.url }}">
  <meta property="og:image" content="https://lintonmccracken.com/preview.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title }} | Linton McCracken">
  <meta name="twitter:description" content="{{ page.excerpt | strip_html | truncate: 160 }}">
  <meta name="twitter:image" content="https://lintonmccracken.com/preview.jpg">
</head>
<body>
  <div class="post-container">
    <header class="post-header">
      <h1 class="post-title">{{ page.title }}</h1>
      <div class="post-meta">
        <time>{{ page.date | date: "%B %d, %Y" }}</time>
        {% if page.tags %}
        <div class="post-tags">
          {% for tag in page.tags %}
          <span>{{ tag }}</span>
          {% endfor %}
        </div>
        {% endif %}
      </div>
    </header>
    
    <article class="post-content">
      {{ content }}
    </article>
    
    <div class="back-link">
      <a href="/build-log/">← Back to Signal Log</a> | <a href="/">← Home</a>
    </div>
  </div>
</body>
</html>
